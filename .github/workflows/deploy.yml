# ============================================================================
# Deploy — push-to-master automation.
#
# Runs after CI's `check` job succeeds on master. SSHes to the Hetzner box
# using a deploy-only SSH key, pulls, restarts samsinn, then runs the smoke
# script as a gate. If the smoke check exits non-zero the workflow reports
# red and you get an email — same signal as a broken CI.
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_SSH_KEY  — private key (paired with the public key authorised on
#                     the box's /root/.ssh/authorized_keys)
#   DEPLOY_HOST     — IP or hostname of the Hetzner box (e.g. 178.104.229.113)
#
# SAMSINN_TOKEN is read on the BOX from /etc/samsinn/env (root-readable);
# no need to duplicate it as a GitHub secret.
#
# Manual trigger: GitHub Actions tab → Deploy → Run workflow. Useful when
# you want to redeploy the latest master without making a no-op commit.
#
# Bypassing auto-deploy: delete this file (or temporarily disable it from
# the Actions UI). The local fallback `bun run scripts/deploy.ts` remains
# available either way.
# ============================================================================

name: Deploy

on:
  # Triggered AFTER the CI workflow completes on master. The conditional
  # below skips the deploy when CI failed so we never push a broken
  # commit. Use workflow_dispatch to redeploy without a new commit.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:    # manual run from the Actions UI

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # let an in-flight deploy finish; queue new ones

jobs:
  deploy:
    # Skip when CI failed. workflow_dispatch (manual) always runs.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: SSH key + known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull + restart on host
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} '
            set -e
            cd /opt/samsinn
            sudo -u samsinn git pull --ff-only
            systemctl restart samsinn
            # systemctl is-active flips green the moment bun forks, but the
            # HTTP listener is not up until ~5s of pack/skill init has
            # finished. Poll the readiness probe so the smoke step does not
            # race with startup.
            for i in $(seq 1 30); do
              if curl -fsS -o /dev/null http://127.0.0.1:3000/api/system/info; then
                echo "samsinn HTTP up after ${i}s"
                exit 0
              fi
              sleep 1
            done
            echo "samsinn HTTP did not come up within 30s" >&2
            systemctl status samsinn --no-pager
            exit 1
          '

      - name: Caddy drift check (CSP hosts)
        # The auto-deploy pipeline intentionally does NOT replace
        # /etc/caddy/Caddyfile (per CLAUDE.md: deploy/Caddyfile is a
        # TEMPLATE; prod has tuned values). But that lets CSP / header
        # changes shipped in the repo silently never reach the edge —
        # exactly how the storage.googleapis.com fix sat undeployed for
        # days while the biometrics feature was broken.
        #
        # This step catches the gap: every host the template's
        # connect-src declares must also be in the live Caddyfile.
        # When this fails, run the "caddy-patch" workflow (named, idempotent
        # SSH patches) to reconcile, then re-run Deploy.
        run: |
          REPO_HOSTS=$(grep -oE 'connect-src[^"]*' deploy/Caddyfile | grep -oE 'https://[a-zA-Z0-9.-]+' | sort -u)
          LIVE_HOSTS=$(ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} \
            "grep -oE 'connect-src[^\"]*' /etc/caddy/Caddyfile | grep -oE 'https://[a-zA-Z0-9.-]+' | sort -u")
          MISSING=$(comm -23 <(echo "$REPO_HOSTS") <(echo "$LIVE_HOSTS"))
          if [ -n "$MISSING" ]; then
            echo "::error::Caddyfile drift detected — hosts present in repo template but missing on prod:" >&2
            echo "$MISSING" >&2
            echo "" >&2
            echo "Run the 'Caddy patch' workflow to reconcile, then re-run Deploy." >&2
            exit 1
          fi
          echo "Caddyfile connect-src in sync: $(echo $LIVE_HOSTS | tr '\n' ' ')"

      - name: Streaming probe (real eval + evict→reload)
        # Subsumes the older smoke-streaming.ts: this probe runs an actual
        # LLM eval through a fresh probe-instance, evicts that instance,
        # lazy-reloads it, and asserts agent_state 'generating' + chunk
        # broadcasts arrive on the reloaded agent. The evict→reload boundary
        # is the path that hid the unsubscribeAgentState leak fixed in
        # 6d107de — this gate is what stops that bug class from re-shipping.
        # Smoke-streaming.ts is retained for local dev (lighter, no LLM call)
        # but is no longer in the deploy gate.
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} '
            set -a; source /etc/samsinn/env; set +a
            cd /opt/samsinn
            /home/samsinn/.bun/bin/bun run scripts/streaming-probe.ts --evict-reload
          '

