<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>samsinn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <style>
    /* Prose styles for rendered Markdown inside messages */
    .msg-prose h1 { font-size: 1.25em; font-weight: 700; margin: 0.5em 0 0.25em; }
    .msg-prose h2 { font-size: 1.15em; font-weight: 600; margin: 0.5em 0 0.25em; }
    .msg-prose h3 { font-size: 1.05em; font-weight: 600; margin: 0.4em 0 0.2em; }
    .msg-prose p { margin: 0.3em 0; }
    .msg-prose ul, .msg-prose ol { margin: 0.3em 0; padding-left: 1.5em; }
    .msg-prose ul { list-style-type: disc; }
    .msg-prose ol { list-style-type: decimal; }
    .msg-prose li { margin: 0.1em 0; }
    .msg-prose code { background: #f3f4f6; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.9em; }
    .msg-prose pre { background: #1f2937; color: #e5e7eb; padding: 0.75em; border-radius: 6px; overflow-x: auto; margin: 0.4em 0; }
    .msg-prose pre code { background: none; padding: 0; color: inherit; }
    .msg-prose blockquote { border-left: 3px solid #d1d5db; padding-left: 0.75em; margin: 0.4em 0; color: #6b7280; }
    .msg-prose a { color: #3b82f6; text-decoration: underline; }
    .msg-prose table { border-collapse: collapse; margin: 0.4em 0; font-size: 0.9em; }
    .msg-prose th, .msg-prose td { border: 1px solid #d1d5db; padding: 0.25em 0.5em; }
    .msg-prose th { background: #f3f4f6; font-weight: 600; }
    .msg-prose strong { font-weight: 600; }
    .msg-prose em { font-style: italic; }
  </style>
  <style>
    .msg-system { color: #6b7280; font-style: italic; }
    .msg-pass { color: #9ca3af; font-style: italic; font-size: 0.75rem; }
    .prompt-icon { cursor: pointer; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: #e5e7eb; color: #6b7280; font-size: 10px; font-weight: bold; }
    .prompt-icon:hover { background: #3b82f6; color: white; }
    .prompt-tooltip { display: none; position: absolute; z-index: 40; background: #1f2937; color: white; padding: 6px 10px; border-radius: 6px; font-size: 11px; max-width: 280px; white-space: pre-wrap; word-break: break-word; line-height: 1.4; }
    .prompt-icon:hover + .prompt-tooltip { display: block; }
    .msg-self { background: #eff6ff; }
    .msg-agent { background: #f0fdf4; }
    .typing-indicator { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    #messages { scroll-behavior: smooth; }
    .mute-btn { cursor: pointer; font-size: 11px; padding: 1px 5px; border-radius: 3px; border: 1px solid #d1d5db; }
    .mute-btn:hover { background: #fee2e2; border-color: #fca5a5; }
    .mute-btn.muted { background: #fecaca; color: #991b1b; border-color: #fca5a5; }
    .agent-muted { opacity: 0.5; }
  </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">
  <!-- Header -->
  <header class="bg-white border-b px-4 py-2 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-semibold text-gray-800">samsinn</h1>
      <button id="btn-house-prompt" class="prompt-icon" title="House Rules">H</button>
      <button id="btn-response-format" class="prompt-icon" title="Response Format">F</button>
    </div>
    <div id="connection-status" class="text-sm text-gray-500">Connecting...</div>
  </header>

  <!-- Main layout: sidebar + chat + agent panel -->
  <main class="flex flex-1 overflow-hidden">
    <!-- Room sidebar -->
    <aside id="room-sidebar" class="w-56 bg-white border-r flex flex-col">
      <div class="p-3 border-b flex items-center justify-between">
        <span class="text-sm font-medium text-gray-600">Rooms</span>
        <button id="btn-create-room" class="text-xs bg-blue-500 text-white px-2 py-1 rounded hover:bg-blue-600">+ Room</button>
      </div>
      <div id="room-list" class="flex-1 overflow-y-auto"></div>
    </aside>

    <!-- Chat area -->
    <section class="flex-1 flex flex-col">
      <!-- Room header -->
      <div id="room-header" class="px-4 py-2 border-b bg-white">
        <div class="flex items-center gap-2">
          <div id="room-name" class="font-medium text-gray-800">Select a room</div>
          <button id="btn-room-prompt" class="prompt-icon" title="Room Prompt">R</button>
          <select id="mode-selector" class="ml-auto text-xs border rounded px-2 py-1 bg-gray-50">
            <option value="broadcast">Broadcast</option>
            <option value="staleness">Staleness</option>
          </select>
        </div>
        <div id="room-mode-info" class="text-xs text-gray-400 h-4"></div>
        <div id="typing-indicators" class="text-xs text-blue-500 h-4"></div>
      </div>

      <!-- Messages -->
      <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-2"></div>

      <!-- Chat input -->
      <form id="chat-form" class="p-3 border-t bg-white flex gap-2">
        <input id="chat-input" type="text" placeholder="Type a message..."
               class="flex-1 px-3 py-2 border rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
               autocomplete="off" disabled>
        <button type="submit" id="btn-send" class="px-4 py-2 bg-blue-500 text-white text-sm rounded hover:bg-blue-600 disabled:opacity-50" disabled>Send</button>
        <select id="flow-selector" class="text-xs border rounded px-2 py-1 bg-gray-50 hidden">
          <option value="">Flow...</option>
        </select>
      </form>
    </section>

    <!-- Agent panel -->
    <aside id="agent-panel" class="w-64 bg-white border-l flex flex-col">
      <div class="p-3 border-b flex items-center justify-between">
        <span class="text-sm font-medium text-gray-600">Agents</span>
        <button id="btn-create-agent" class="text-xs bg-green-500 text-white px-2 py-1 rounded hover:bg-green-600">+ Agent</button>
      </div>
      <div id="agent-list" class="flex-1 overflow-y-auto"></div>
    </aside>
  </main>

  <!-- Create Room Modal -->
  <dialog id="room-modal" class="rounded-lg shadow-xl p-0 w-96">
    <form id="room-form" class="p-4 space-y-3">
      <h3 class="font-medium text-gray-800">Create Room</h3>
      <input name="name" placeholder="Room name" required class="w-full px-3 py-2 border rounded text-sm">
      <select name="visibility" class="w-full px-3 py-2 border rounded text-sm">
        <option value="public">Public</option>
        <option value="private">Private</option>
      </select>
      <div class="flex justify-end gap-2">
        <button type="button" onclick="this.closest('dialog').close()" class="px-3 py-1 text-sm text-gray-600">Cancel</button>
        <button type="submit" class="px-3 py-1 text-sm bg-blue-500 text-white rounded">Create</button>
      </div>
    </form>
  </dialog>

  <!-- Create Agent Modal -->
  <dialog id="agent-modal" class="rounded-lg shadow-xl p-0 w-96">
    <form id="agent-form" class="p-4 space-y-3">
      <h3 class="font-medium text-gray-800">Create AI Agent</h3>
      <input name="name" placeholder="Agent name" required class="w-full px-3 py-2 border rounded text-sm">
      <input name="model" placeholder="Model (e.g., qwen2.5:14b)" value="qwen2.5:14b" required class="w-full px-3 py-2 border rounded text-sm">
      <textarea name="systemPrompt" placeholder="System prompt..." required rows="4" class="w-full px-3 py-2 border rounded text-sm"></textarea>
      <div class="flex justify-end gap-2">
        <button type="button" onclick="this.closest('dialog').close()" class="px-3 py-1 text-sm text-gray-600">Cancel</button>
        <button type="submit" class="px-3 py-1 text-sm bg-green-500 text-white rounded">Create</button>
      </div>
    </form>
  </dialog>

  <!-- Name prompt modal -->
  <dialog id="name-modal" class="rounded-lg shadow-xl p-0 w-80">
    <form id="name-form" class="p-4 space-y-3">
      <p class="text-sm text-gray-600">Enter your name to join:</p>
      <input name="name" placeholder="Your name" required autofocus class="w-full px-3 py-2 border rounded text-sm">
      <button type="submit" class="w-full px-3 py-2 bg-blue-500 text-white text-sm rounded hover:bg-blue-600">Join</button>
    </form>
  </dialog>

  <script type="module" src="/modules/app.ts"></script>
</body>
</html>
